<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NutriTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .profile-card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 10px 30px;
        }
        .btn-secondary {
            border-radius: 25px;
            padding: 10px 30px;
        }
        .nav-link {
            color: #6c757d;
            font-weight: 500;
        }
        .nav-link.active {
            color: #667eea;
            font-weight: 600;
        }
        .success-message {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border-radius: 10px;
        }
        .error-message {
            background: linear-gradient(45deg, #dc3545, #f86734);
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard-working.html">
                <i class="fas fa-heartbeat text-primary me-2"></i>NutriTrack
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">
                    <i class="fas fa-tachometer-alt me-1"></i> Dashboard
                </a>
                <a class="nav-link active" href="/profile">
                    <i class="fas fa-user me-1"></i> Profile
                </a>
                <a class="nav-link" href="/add-meal.html">
                    <i class="fas fa-utensils me-1"></i> Add Meal
                </a>
                <a class="nav-link" href="/reports.html">
                    <i class="fas fa-chart-line me-1"></i> Reports
                </a>
                <a class="nav-link" href="/goals">
                    <i class="fas fa-bullseye me-1"></i> Goals
                </a>
                <a class="nav-link" href="/bmi">
                    <i class="fas fa-calculator me-1"></i> BMI
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Profile Header -->
    <div class="profile-header">
        <div class="container text-center">
            <h1 class="mb-3">
                <i class="fas fa-user-circle me-2"></i>
                <span id="welcomeUsername">Loading...</span>
            </h1>
            <p class="lead mb-0">Manage your profile and health information</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        <div class="row">
            <!-- Profile Form -->
            <div class="col-lg-8 mx-auto">
                <div class="card profile-card">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="fas fa-edit me-2 text-primary"></i>
                            Edit Profile
                        </h3>
                        
                        <!-- Alert Messages -->
                        <div id="alertContainer"></div>

                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">
                                        <i class="fas fa-user me-1"></i> Full Name
                                    </label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="username" class="form-label">
                                        <i class="fas fa-id-badge me-1"></i> Username
                                    </label>
                                    <input type="text" class="form-control" id="username" name="username" readonly>
                                    <small class="text-muted">Username cannot be changed</small>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="weight" class="form-label">
                                        <i class="fas fa-weight me-1"></i> Weight (kg)
                                    </label>
                                    <input type="number" class="form-control" id="weight" name="weight" step="0.1" min="20" max="500" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="height" class="form-label">
                                        <i class="fas fa-ruler-vertical me-1"></i> Height (m)
                                    </label>
                                    <input type="number" class="form-control" id="height" name="height" step="0.01" min="0.5" max="3.0" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="age" class="form-label">
                                        <i class="fas fa-birthday-cake me-1"></i> Age
                                    </label>
                                    <input type="number" class="form-control" id="age" name="age" min="10" max="120" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="gender" class="form-label">
                                        <i class="fas fa-venus-mars me-1"></i> Gender
                                    </label>
                                    <select class="form-select" id="gender" name="gender" required>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="activityLevel" class="form-label">
                                        <i class="fas fa-running me-1"></i> Activity Level
                                    </label>
                                    <select class="form-select" id="activityLevel" name="activityLevel" required>
                                        <option value="sedentary">Sedentary</option>
                                        <option value="light">Lightly Active</option>
                                        <option value="moderate">Moderately Active</option>
                                        <option value="very_active">Very Active</option>
                                        <option value="extra_active">Extra Active</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary me-md-2" onclick="resetForm()">
                                    <i class="fas fa-undo me-1"></i> Reset
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Current Stats Card -->
                <div class="card profile-card mt-4">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="fas fa-chart-bar me-2 text-success"></i>
                            Current Stats
                        </h3>
                        <div class="row text-center">
                            <div class="col-md-3 mb-3">
                                <div class="stat-item">
                                    <h4 class="text-primary" id="bmiValue">--</h4>
                                    <p class="mb-0 text-muted">BMI</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-item">
                                    <h4 class="text-success" id="bmrValue">--</h4>
                                    <p class="mb-0 text-muted">BMR</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-item">
                                    <h4 class="text-warning" id="dailyCaloriesValue">--</h4>
                                    <p class="mb-0 text-muted">Daily Calories</p>
                                </div>
                            </div>
                            <div class="col-md-3 mb-3">
                                <div class="stat-item">
                                    <h4 class="text-info" id="dailyProteinValue">--</h4>
                                    <p class="mb-0 text-muted">Daily Protein (g)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2024 NutriTrack. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load user profile data
        async function loadProfile() {
            try {
                const response = await fetch('/api/nutrition/summary');
                const data = await response.json();
                
                if (data.success) {
                    // Load user data (we'll need to add a new endpoint for this)
                    await loadUserData();
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                window.location.href = '/';
            }
        }

        // Load user data
        async function loadUserData() {
            try {
                // For now, we'll use the session data or create a new endpoint
                const response = await fetch('/api/user/profile');
                const userData = await response.json();
                
                if (userData.success) {
                    populateForm(userData.user);
                    updateStats(userData.user);
                    document.getElementById('welcomeUsername').textContent = userData.user.name;
                }
            } catch (error) {
                console.error('Error loading user data:', error);
                // Fallback - try to get basic info from session
                document.getElementById('welcomeUsername').textContent = 'User';
            }
        }

        // Populate form with user data
        function populateForm(user) {
            document.getElementById('name').value = user.name || '';
            document.getElementById('username').value = user.username || '';
            document.getElementById('weight').value = user.weight || '';
            document.getElementById('height').value = user.height || '';
            document.getElementById('age').value = user.age || '';
            document.getElementById('gender').value = user.gender || 'male';
            document.getElementById('activityLevel').value = user.activityLevel || 'moderate';
        }

        // Update stats display
        function updateStats(user) {
            // Calculate BMI
            const bmi = user.weight / (user.height * user.height);
            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            
            // Calculate BMR (simplified)
            let bmr;
            if (user.gender === 'male') {
                bmr = 88.362 + (13.397 * user.weight) + (4.799 * user.height * 100) - (5.677 * user.age);
            } else {
                bmr = 447.593 + (9.247 * user.weight) + (3.098 * user.height * 100) - (4.330 * user.age);
            }
            document.getElementById('bmrValue').textContent = Math.round(bmr);
            
            // Display targets
            document.getElementById('dailyCaloriesValue').textContent = user.targetCalories || '--';
            document.getElementById('dailyProteinValue').textContent = user.targetProtein ? user.targetProtein.toFixed(1) : '--';
        }

        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('Profile updated successfully!', 'success');
                    updateStats(result.user);
                    document.getElementById('welcomeUsername').textContent = result.user.name;
                } else {
                    showAlert(result.message || 'Error updating profile', 'error');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showAlert('Error updating profile. Please try again.', 'error');
            }
        });

        // Show alert message
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${type}-message alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alertDiv);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Reset form
        function resetForm() {
            loadUserData();
        }

        // Load profile on page load
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
